# ===================================================================
# Orion Key CI/CD 工作流
# ===================================================================
#
# 流程：push 到 main/tag → 云端构建两个 Docker 镜像 → 推送 GHCR
#
# 镜像构建方式：
#   后端 (Java):  Jib Maven 插件直接产出 Docker 镜像（无需 Dockerfile）
#   前端 (Next.js): 标准 Dockerfile 多阶段构建
#
# ===================================================================

name: Orion Key CI/CD

# ── 触发条件 ──
on:
  push:
    branches: [main]        # push 到 prod 分支时触发
    tags: ['v*']            # push tag（如 v1.0.0）时触发
  workflow_dispatch:         # 支持在 GitHub Actions 页面手动触发
    inputs:
      image_tag:
        description: '镜像标签（留空自动生成）'
        required: false
        type: string

# 全局权限：最小权限原则
permissions:
  contents: read

jobs:
  # ════════════════════════════════════════════════════════════════
  # Job 1: 构建并推送镜像（在 GitHub 云端 runner 上执行）
  # ════════════════════════════════════════════════════════════════
  build-and-push:
    runs-on: ubuntu-latest      # 使用 GitHub 提供的云端 Ubuntu 机器
    permissions:
      contents: read
      packages: write           # 推送 GHCR 镜像需要 write 权限

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 22
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '22'
          cache: maven          # 缓存 Maven 依赖，加速后续构建

      # 计算镜像标签：手动输入 > git tag > commit SHA 前 7 位
      - name: Compute image tags
        id: meta
        shell: bash
        run: |
          if [ -n "${{ inputs.image_tag }}" ]; then
            TAG="${{ inputs.image_tag }}"
          elif [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            TAG="${GITHUB_REF_NAME}"
          else
            TAG="${GITHUB_SHA::7}"
          fi
          # Docker 镜像名要求全小写
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "tag=$TAG"                                                >> "$GITHUB_OUTPUT"
          echo "api_image=ghcr.io/$OWNER/orion-key-api:$TAG"            >> "$GITHUB_OUTPUT"
          echo "web_image=ghcr.io/$OWNER/orion-key-web:$TAG"            >> "$GITHUB_OUTPUT"

      # ── 后端镜像：Jib 构建（无需 Docker daemon，无需 Dockerfile）──
      - name: Build & Push API image (Jib)
        working-directory: apps/api
        run: |
          mvn -B -DskipTests \
            -Djib.to.image="${{ steps.meta.outputs.api_image }}" \
            -Djib.to.auth.username="${{ github.actor }}" \
            -Djib.to.auth.password="${{ secrets.GITHUB_TOKEN }}" \
            compile jib:build

      # ── 前端镜像：Docker 多阶段构建 ──
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push Web image
        uses: docker/build-push-action@v6
        with:
          context: .                # 构建上下文 = 仓库根目录（Dockerfile.web 需要 monorepo 配置文件）
          file: ./Dockerfile.web    # 指定 Dockerfile 路径
          push: true
          tags: ${{ steps.meta.outputs.web_image }}
          build-args: |
            BACKEND_URL=${{ vars.BACKEND_URL }}
